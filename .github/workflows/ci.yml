name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: timesheet
          POSTGRES_PASSWORD: timesheet
          POSTGRES_DB: timesheet
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U timesheet -d timesheet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://timesheet:timesheet@localhost:5433/timesheet

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Apply DB migrations so the API integration test has its schema.
      - run: pnpm --filter @timesheet/api run db:migrate

      - run: pnpm exec nx format:check
      - run: pnpm exec nx run-many -t lint typecheck test build
